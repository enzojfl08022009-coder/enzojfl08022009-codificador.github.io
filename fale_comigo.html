<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Fale Comigo</title>
        <link rel="stylesheet" href="fale.css">
    </head>
    <body>
        <form method="GET" action="fale_retorno.html">
            <p>Preencha o fomulário para entrar em contato comigo!</p><br>
            <label for="txt_empresa">Interessado: </label>
            <input type="text" for="txt_empresa"><br>
            <label for="quem_interessado">Tipo: </label>
            <select name="quem_interessado">
                <option value=""></option>
                <option value="PF">Pessoa Física</option>
                <option value="EM">Empresa</option>
            </select><br>
            <label for="txt_ctt">Contato</label>
            <input type="text" for="txt_ctt"><br>
            <input type="submit" value="enviar">
            <input type="reset" value="Limpar"><br>
            
        </form>
        <fieldset>
            <legend>Aviso:</legend>
            <p>Preencha os dados corretamente!</p>
        </fieldset>
       
        

    </body>
</html>
